<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrowaste X</title>
    <link rel="stylesheet" href="farmer.css">
    <script src="config.js"></script>
</head>

<body >
    <nav id="navbar">
        <a href="farmer.html" id="navelement">Home</a>|
        <a href="farmerlogin.html" id="navelement" class="active">Login</a>|
        <a href="wasteEntry.html" id="navelement">Waste entry</a>|
        <a href="reports.html" id="navelement">Reports</a>
        <button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
    </nav>
    <div id="divbody">
        <h1>Fill your details:</h1>
    <div id="container">
        <form id="loginForm">
            <div id="feild">
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter your name" required>
            </div>

            <div id="feild">
            <label for="mail">Email:</label>
            <input type="email" id="mail" placeholder="abc@gmail.com" required>
            </div>

            <div id="feild">
            <label for="password">Password:</label>
            <input type="password" id="password" required>
            </div>
            <input type="submit" id="button" value="Login">
        </form>
    </div>
    </div>

    <script>
        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('loggedInUser');
            window.location.href = 'farmer.html';
        }

        // Show error message function
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background-color: #f44336;
                color: white;
                padding: 30px 50px;
                border-radius: 10px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
                z-index: 1000;
                font-size: 18px;
                text-align: center;
            `;
            errorDiv.textContent = message;
            document.body.appendChild(errorDiv);
            
            setTimeout(() => {
                errorDiv.remove();
            }, 3000);
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('mail').value,
                password: document.getElementById('password').value
            };
            
            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('loggedInUser', JSON.stringify(result.user));
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'wasteEntry.html';
                } else {
                    showError('Login failed: ' + result.message);
                }
            } catch (error) {
                console.error('Error:', error);
                showError('⚠️ Server not running! Please start the server with: npm start');
            }
        });
    </script>
</body>
</html>
