<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrowaste X - Reports</title>
    <link rel="stylesheet" href="farmer.css">
    <script src="config.js"></script>
    <style>
        #reportsContainer {
            width: 90%;
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-radius: 5px;
            overflow: hidden;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background-color: #2b2b2b;
            color: white;
            font-weight: bold;
        }
        
        tr:hover {
            background-color: #f5f5f5;
        }
        
        .status-pending {
            color: orange;
            font-weight: bold;
        }
        
        .status-completed {
            color: green;
            font-weight: bold;
        }

        .completed-row {
            background-color: #e8f5e9 !important;
            border-left: 5px solid #4CAF50;
        }

        .completed-row:hover {
            background-color: #c8e6c9 !important;
        }

        .ready-notification {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .collect-button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
        }

        .collect-button:hover {
            background-color: #45a049;
        }

        .collected {
            background-color: #f0f0f0 !important;
            opacity: 0.7;
            text-decoration: line-through;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .summary-card h3 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        .summary-card p {
            margin: 0;
            color: #666;
        }

        .ready-card {
            border-left: 5px solid #4CAF50;
        }

        .pending-card {
            border-left: 5px solid #ff9800;
        }

        .total-card {
            border-left: 5px solid #2196F3;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }
        
        #clearButton {
            margin: 20px auto;
            display: block;
            background-color: #ff4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        #clearButton:hover {
            background-color: #cc0000;
        }

        .confirm-dialog {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            text-align: center;
        }

        .confirm-dialog h3 {
            margin-top: 0;
            color: #333;
        }

        .confirm-dialog button {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .confirm-yes {
            background-color: #ff4444;
            color: white;
        }

        .confirm-yes:hover {
            background-color: #cc0000;
        }

        .confirm-no {
            background-color: #4CAF50;
            color: white;
        }

        .confirm-no:hover {
            background-color: #45a049;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 999;
        }
    </style>
</head>

<body>
    <header id="homeheader">
        <h1>Waste Reports</h1>
    </header>
    <nav id="navbar">
        <a href="farmer.html" id="navelement">Home</a>|
        <a href="farmerlogin.html" id="navelement">Login</a>|
        <a href="wasteEntry.html" id="navelement">Waste entry</a>|
        <a href="reports.html" id="navelement" class="active">Reports</a>
        <button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
    </nav>

    <div class="overlay" id="overlay"></div>
    <div class="confirm-dialog" id="confirmDialog">
        <h3>Are you sure?</h3>
        <p>Do you want to clear all reports? This action cannot be undone.</p>
        <button class="confirm-yes" onclick="confirmClear()">Yes, Clear All</button>
        <button class="confirm-no" onclick="cancelClear()">Cancel</button>
    </div>

    <div id="reportsContainer">
        <h2 style="text-align: center; color: #2b2b2b;">Waste Management Dashboard</h2>
        
        <div id="summaryCards" class="summary-cards"></div>
        <div id="readyNotification"></div>
        <div id="tableContainer"></div>
        
        <button id="clearButton">Clear All Reports</button>
    </div>

    <script>
        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('loggedInUser');
            window.location.href = 'farmer.html';
        }

        async function loadReports() {
            // Check if user is logged in
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (!isLoggedIn || isLoggedIn !== 'true') {
                window.location.href = 'farmerlogin.html';
                return;
            }

            // Show logout button
            document.getElementById('logoutBtn').style.display = 'inline-block';

            // Get current logged-in user
            const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));
            const userEmail = loggedInUser.email;

            try {
                const response = await fetch(`http://localhost:3000/api/waste-entries/${userEmail}`);
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.message);
                }
                
                const userEntries = result.entries;
                const tableContainer = document.getElementById('tableContainer');
                
                if (userEntries.length === 0) {
                    document.getElementById('summaryCards').innerHTML = '';
                    document.getElementById('readyNotification').innerHTML = '';
                    tableContainer.innerHTML = '<div class="no-data">No waste entries found. Please add entries from the Waste Entry page.</div>';
                    return;
                }
                
                const now = new Date();
                let readyCount = 0;
                let pendingCount = 0;
                let totalCompost = 0;
                let readyCompost = 0;
                
                // Calculate summary statistics
                userEntries.forEach(entry => {
                    if (!entry.collected) {
                        const completionDate = new Date(entry.completionDate);
                        const daysRemaining = Math.ceil((completionDate - now) / (1000 * 60 * 60 * 24));
                        
                        if (daysRemaining <= 0) {
                            readyCount++;
                            readyCompost += entry.amount;
                        } else {
                            pendingCount++;
                        }
                        totalCompost += entry.amount;
                    }
                });

                // Show summary cards
                document.getElementById('summaryCards').innerHTML = `
                    <div class="summary-card ready-card">
                        <h3>${readyCount}</h3>
                        <p>Ready to Collect</p>
                    </div>
                    <div class="summary-card pending-card">
                        <h3>${pendingCount}</h3>
                        <p>Still Composting</p>
                    </div>
                    <div class="summary-card total-card">
                        <h3>${readyCompost.toFixed(1)} kg</h3>
                        <p>Compost Ready</p>
                    </div>
                `;

                // Show notification if compost is ready
                if (readyCount > 0) {
                    document.getElementById('readyNotification').innerHTML = `
                        <div class="ready-notification">
                            🎉 Great news! You have ${readyCount} batch${readyCount > 1 ? 'es' : ''} of compost ready to collect (${readyCompost.toFixed(1)} kg total)
                        </div>
                    `;
                } else {
                    document.getElementById('readyNotification').innerHTML = '';
                }
                
                let tableHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Entry Date</th>
                                <th>Type of Waste</th>
                                <th>Amount (kg)</th>
                                <th>Composting Time (days)</th>
                                <th>Completion Date</th>
                                <th>Days Remaining</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                userEntries.forEach(entry => {
                    const entryDate = new Date(entry.entryDate);
                    const completionDate = new Date(entry.completionDate);
                    const daysRemaining = Math.ceil((completionDate - now) / (1000 * 60 * 60 * 24));
                    
                    let status, statusClass, actionButton, rowClass = '';
                    
                    if (entry.collected) {
                        status = 'Collected ✓';
                        statusClass = 'status-completed';
                        actionButton = '<span style="color: #666;">Collected</span>';
                        rowClass = 'collected';
                    } else if (daysRemaining <= 0) {
                        status = 'Ready to Collect! 🎉';
                        statusClass = 'status-completed';
                        actionButton = `<button class="collect-button" onclick="markAsCollected('${entry._id}')">Mark as Collected</button>`;
                        rowClass = 'completed-row';
                    } else {
                        status = 'Composting...';
                        statusClass = 'status-pending';
                        actionButton = '<span style="color: #666;">Wait</span>';
                    }
                    
                    tableHTML += `
                        <tr class="${rowClass}" id="row-${entry._id}">
                            <td>${entryDate.toLocaleDateString()}</td>
                            <td>${entry.type}</td>
                            <td>${entry.amount}</td>
                            <td>${entry.compostTime}</td>
                            <td>${completionDate.toLocaleDateString()}</td>
                            <td>${daysRemaining > 0 ? daysRemaining : 0}</td>
                            <td class="${statusClass}">${status}</td>
                            <td>${actionButton}</td>
                        </tr>
                    `;
                });
                
                tableHTML += `
                        </tbody>
                    </table>
                `;
                
                tableContainer.innerHTML = tableHTML;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tableContainer').innerHTML = '<div class="no-data">Failed to load reports. Please make sure the server is running.</div>';
            }
        }

        async function markAsCollected(entryId) {
            try {
                const response = await fetch(`http://localhost:3000/api/waste-entries/${entryId}/collect`, {
                    method: 'PATCH'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Show success message
                    showSuccessMessage('Compost marked as collected! 🎉');
                    // Reload reports to update the display
                    loadReports();
                } else {
                    alert('Failed to mark as collected: ' + result.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to connect to server.');
            }
        }

        function showSuccessMessage(message) {
            const successDiv = document.createElement('div');
            successDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background-color: #4CAF50;
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
                z-index: 1000;
                font-size: 16px;
            `;
            successDiv.textContent = message;
            document.body.appendChild(successDiv);
            
            setTimeout(() => {
                successDiv.remove();
            }, 3000);
        }
        
        document.getElementById('clearButton').addEventListener('click', function() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('confirmDialog').style.display = 'block';
        });

        async function confirmClear() {
            // Get current logged-in user
            const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));
            const userEmail = loggedInUser.email;

            try {
                const response = await fetch(`http://localhost:3000/api/waste-entries/${userEmail}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('overlay').style.display = 'none';
                    document.getElementById('confirmDialog').style.display = 'none';
                    loadReports();
                } else {
                    alert('Failed to clear reports: ' + result.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to connect to server.');
            }
        }

        function cancelClear() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('confirmDialog').style.display = 'none';
        }
        
        loadReports();
    </script>

</body>
</html>
